<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灯雪镇 · 账号中心</title>
    <link rel="icon" type="image/jpeg" href="server-icon.jpg">
    <style>
        /* ===== 样式完全沿用您原有的 auth.html ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-color: #0a2a3f;
            --card-bg: rgba(10, 30, 50, 0.85);
            --glass-border: rgba(64, 164, 255, 0.35);
            --accent-blue: #2c9cf0;
            --accent-gold: #f5b042;
            --text-main: #eef5ff;
            --text-dim: #b9d0f0;
            --shadow-soft: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
            --border-radius-card: 28px;
            --backdrop-blur: 16px;
            --input-bg: rgba(20, 40, 65, 0.7);
            --footer-color: #6c8db0;
            --border-light: rgba(100, 180, 250, 0.2);
            --danger: #f56c6c;
            --success: #67c23a;
            --warning: #e6a23c;
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }
        body.theme-light {
            --bg-color: #f0f4fa;
            --card-bg: rgba(255, 255, 255, 0.88);
            --glass-border: rgba(100, 140, 200, 0.4);
            --accent-blue: #2c7be5;
            --accent-gold: #d99e2b;
            --text-main: #1e2f3c;
            --text-dim: #2c4058;
            --shadow-soft: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            --input-bg: #eef2f6;
            --footer-color: #5a6f8c;
            --border-light: rgba(80, 120, 180, 0.2);
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }
        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', 'Inter', 'PingFang SC', system-ui, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.25s ease, color 0.25s ease;
        }
        #authBgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--backdrop-blur));
            border-radius: var(--border-radius-card);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            padding: 32px 28px 36px;
            transition: transform 0.25s ease, box-shadow 0.3s;
            animation: cardFadeIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
        @keyframes cardFadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d9eaff, #7bc5ff, #f5b042);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .auth-header p {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 4px;
            letter-spacing: 1.5px;
        }
        .auth-subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 22px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 14px;
        }
        .auth-subtitle span {
            color: var(--accent-gold);
            font-weight: 600;
        }
        .auth-view {
            display: none;
            animation: viewFade 0.3s ease;
        }
        .auth-view.active {
            display: block;
        }
        @keyframes viewFade {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 5px;
            color: var(--text-dim);
        }
        .form-group .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .form-group .label-row a {
            font-size: 0.78rem;
            color: var(--accent-blue);
            cursor: pointer;
            text-decoration: none;
            border-bottom: 1px dashed transparent;
            transition: 0.2s;
        }
        .form-group .label-row a:hover {
            border-bottom-color: var(--accent-blue);
        }
        .form-control {
            width: 100%;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            font-family: inherit;
        }
        .form-control:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(44, 156, 240, 0.25);
        }
        .form-control::placeholder {
            color: var(--text-dim);
            opacity: 0.6;
        }
        body.theme-light .form-control {
            border-color: rgba(80, 120, 180, 0.3);
            color: #1e2f3c;
        }
        body.theme-light .form-control:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(44, 123, 229, 0.2);
        }
        .form-control.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(245, 108, 108, 0.2);
        }
        .form-control.success {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(103, 194, 58, 0.2);
        }
        .form-hint {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
            padding-left: 14px;
            opacity: 0.8;
        }
        .form-hint.error {
            color: var(--danger);
        }
        .form-hint.success {
            color: var(--success);
        }
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .captcha-row .form-control {
            flex: 1;
        }
        .captcha-box {
            flex-shrink: 0;
            background: var(--input-bg);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 4px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            user-select: none;
            border: 1px solid var(--glass-border);
            min-width: 100px;
            text-align: center;
            color: var(--accent-blue);
            transition: 0.2s;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .captcha-box:hover {
            border-color: var(--accent-blue);
            transform: scale(1.02);
        }
        .captcha-box.refreshing {
            opacity: 0.5;
            pointer-events: none;
        }
        .code-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .code-row .form-control {
            flex: 1;
        }
        .send-code-btn {
            flex-shrink: 0;
            padding: 0 18px;
            height: 44px;
            border-radius: 40px;
            border: none;
            background: var(--accent-blue);
            color: #fff;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .send-code-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        .send-code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue), #1a7fcf);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 15px rgba(44, 156, 240, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(44, 156, 240, 0.45);
            filter: brightness(1.05);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }
        .btn-secondary {
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-dim);
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(44, 156, 240, 0.1);
            border-color: var(--accent-blue);
            color: var(--text-main);
        }
        .btn-danger {
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid var(--danger);
            background: transparent;
            color: var(--danger);
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-danger:hover {
            background: rgba(245, 108, 108, 0.15);
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 0.75rem;
            height: 30px;
            width: auto;
            border-radius: 30px;
        }
        .auth-footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border-light);
            padding-top: 18px;
        }
        .auth-footer-links a {
            color: var(--accent-blue);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            margin: 0 6px;
            transition: 0.2s;
        }
        .auth-footer-links a:hover {
            color: var(--accent-gold);
            text-decoration: underline;
        }
        .auth-footer-links .sep {
            color: var(--text-dim);
            opacity: 0.4;
            margin: 0 4px;
        }
        .back-home {
            display: inline-block;
            margin-top: 16px;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-decoration: none;
            border-bottom: 1px dashed var(--border-light);
            transition: 0.2s;
        }
        .back-home:hover {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }
        .user-profile {
            text-align: center;
            padding: 12px 0;
        }
        .user-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-gold));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            box-shadow: 0 8px 25px rgba(44, 156, 240, 0.3);
        }
        .user-email {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .user-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .user-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 16px 0 20px;
            padding: 12px 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }
        .user-stats .stat-item {
            text-align: center;
        }
        .user-stats .stat-num {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-gold);
        }
        .user-stats .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #eef5ff;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
            border-left: 4px solid var(--accent-blue);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast-msg.success {
            border-left-color: var(--success);
        }
        .toast-msg.error {
            border-left-color: var(--danger);
        }
        body.theme-light .toast-msg {
            background: rgba(30, 47, 60, 0.92);
            color: #f0f4fa;
        }
        @media (max-width: 520px) {
            .auth-card { padding: 22px 16px 28px; }
            .auth-header h1 { font-size: 1.5rem; }
            .captcha-row { flex-wrap: wrap; }
            .captcha-box { width: 100%; min-width: unset; }
            .code-row { flex-wrap: wrap; }
            .send-code-btn { width: 100%; justify-content: center; }
            .user-stats { gap: 16px; flex-wrap: wrap; }
            .toast-msg { white-space: normal; max-width: 90%; font-size: 0.8rem; padding: 8px 18px; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <canvas id="authBgCanvas"></canvas>

    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="auth-header">
                <h1>❄ 灯雪镇</h1>
                <p>账号中心 · 迷雾揭开无限的未来</p>
            </div>

            <!-- ==================== 登录视图 ==================== -->
            <div id="viewLogin" class="auth-view active">
                <div class="auth-subtitle">欢迎回来，<span>登录你的账号</span></div>
                <form id="loginForm" autocomplete="off">
                    <div class="form-group">
                        <label>电子邮箱</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="请输入邮箱地址" required>
                    </div>
                    <div class="form-group">
                        <div class="label-row">
                            <label>密码</label>
                            <a id="loginForgotLink">忘记密码？</a>
                        </div>
                        <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码" required>
                    </div>
                    <div class="form-group">
                        <label>真人验证</label>
                        <div class="captcha-row">
                            <input type="text" class="form-control" id="loginCaptcha" placeholder="输入验证码" maxlength="6" required>
                            <div class="captcha-box" id="loginCaptchaBox" title="点击刷新">A7K2</div>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="loginBtn">登 录</button>
                </form>
                <div class="auth-footer-links">
                    还没有账号？ <a id="loginToRegister">立即注册</a>
                    <span class="sep">·</span>
                    <a href="https://tr114512.github.io/light-snow-town/home.html" class="back-home">← 返回主页</a>
                </div>
            </div>

            <!-- ==================== 注册视图 ==================== -->
            <div id="viewRegister" class="auth-view">
                <div class="auth-subtitle">加入灯雪镇，<span>开启你的旅程</span></div>
                <form id="registerForm" autocomplete="off">
                    <div class="form-group">
                        <label>电子邮箱</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="请输入邮箱地址" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="至少8位，含字母和数字" required>
                        <div class="form-hint" id="regPwdHint">至少8位，含字母和数字</div>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" class="form-control" id="regPasswordConfirm" placeholder="再次输入密码" required>
                    </div>
                    <!-- 注册时不需要手动输入验证码，因为后端会通过 Supabase 发送确认邮件 -->
                    <div class="form-group" style="display:none;">
                        <input type="hidden" id="regCode" value="123456">
                    </div>
                    <div class="form-group">
                        <label>真人验证</label>
                        <div class="captcha-row">
                            <input type="text" class="form-control" id="regCaptcha" placeholder="输入验证码" maxlength="6" required>
                            <div class="captcha-box" id="regCaptchaBox" title="点击刷新">X9F3</div>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="regBtn">注 册</button>
                    <div class="form-hint" style="text-align:center; margin-top:8px;">注册后请查收邮箱验证，未验证账号将被自动清除</div>
                    <div class="form-hint" style="color:#f5b042;text-align:center;">⚠️ 请在5分钟内完成验证</div>
                </form>
                <div class="auth-footer-links">
                    已有账号？ <a id="registerToLogin">去登录</a>
                    <span class="sep">·</span>
                    <a href="https://tr114512.github.io/light-snow-town/home.html" class="back-home">← 返回主页</a>
                </div>
            </div>

            <!-- ==================== 忘记密码视图 ==================== -->
            <div id="viewForgot" class="auth-view">
                <div class="auth-subtitle">重置密码，<span>找回你的账号</span></div>
                <form id="forgotForm" autocomplete="off">
                    <div class="form-group">
                        <label>注册邮箱</label>
                        <input type="email" class="form-control" id="forgotEmail" placeholder="请输入注册邮箱" required>
                    </div>
                    <!-- 忘记密码也不需要验证码，后端会发送重置链接 -->
                    <div class="form-group" style="display:none;">
                        <input type="hidden" id="forgotCode" value="123456">
                    </div>
                    <div class="form-group">
                        <label>新密码（若您通过邮件链接跳转至此，请在此设置）</label>
                        <input type="password" class="form-control" id="forgotNewPwd" placeholder="至少8位，含字母和数字" required>
                    </div>
                    <div class="form-group">
                        <label>确认新密码</label>
                        <input type="password" class="form-control" id="forgotNewPwdConfirm" placeholder="再次输入新密码" required>
                    </div>
                    <div class="form-group">
                        <label>真人验证</label>
                        <div class="captcha-row">
                            <input type="text" class="form-control" id="forgotCaptcha" placeholder="输入验证码" maxlength="6" required>
                            <div class="captcha-box" id="forgotCaptchaBox" title="点击刷新">M4N8</div>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="forgotBtn">发送重置邮件</button>
                    <div class="form-hint" style="text-align:center; margin-top:8px;">点击后，重置链接将发送至您的邮箱</div>
                </form>
                <div class="auth-footer-links">
                    想起密码了？ <a id="forgotToLogin">去登录</a>
                    <span class="sep">·</span>
                    <a href="https://tr114512.github.io/light-snow-town/home.html" class="back-home">← 返回主页</a>
                </div>
            </div>

            <!-- ==================== 个人中心视图 ==================== -->
            <div id="viewProfile" class="auth-view">
                <div class="auth-subtitle">👋 欢迎回来，<span id="profileDisplayName">用户</span></div>
                <div class="user-profile">
                    <div class="user-avatar" id="profileAvatar">❄</div>
                    <div class="user-email" id="profileEmail">user@example.com</div>
                    <div class="user-meta">注册于 <span id="profileJoinDate">2025-01-01</span></div>
                </div>
                <div class="user-stats">
                    <div class="stat-item"><div class="stat-num" id="profileStatus">✓</div><div class="stat-label">账号状态</div></div>
                    <div class="stat-item"><div class="stat-num" id="profileVerified">已验证</div><div class="stat-label">邮箱验证</div></div>
                </div>
                <div style="margin-top: 16px;">
                    <div class="form-group">
                        <label>修改密码</label>
                        <div style="display:flex; gap:8px; flex-wrap:wrap;">
                            <input type="password" class="form-control" id="profileOldPwd" placeholder="当前密码" style="flex:1; min-width:120px;">
                            <input type="password" class="form-control" id="profileNewPwd" placeholder="新密码" style="flex:1; min-width:120px;">
                            <input type="password" class="form-control" id="profileNewPwdConfirm" placeholder="确认新密码" style="flex:1; min-width:120px;">
                        </div>
                    </div>
                    <button class="btn-primary" id="profileChangePwdBtn" style="margin-top:4px;">更新密码</button>
                </div>
                <div style="display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;">
                    <button class="btn-secondary" id="profileLogoutBtn" style="flex:1;">退出登录</button>
                    <button class="btn-secondary" id="profileRefreshBtn" style="flex:1;">刷新状态</button>
                </div>
                <div class="auth-footer-links">
                    <a href="https://tr114512.github.io/light-snow-town/home.html" class="back-home">← 返回主页</a>
                </div>
            </div>

        </div>
    </div>

    <div id="toastMsg" class="toast-msg">提示</div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  配置后端 API 地址（请替换为您的 Vercel 后端域名）
            // ============================================================
            const API_BASE = 'https://light-snow-town.vercel.app/api';  // ⚠️ 请修改

            // ============================================================
            //  工具函数
            // ============================================================
            function $(id) { return document.getElementById(id); }

            function showToast(msg, type) {
                const el = $('toastMsg');
                if (!el) return;
                el.textContent = msg;
                el.className = 'toast-msg';
                if (type === 'success') el.classList.add('success');
                else if (type === 'error') el.classList.add('error');
                el.classList.add('show');
                clearTimeout(el._timer);
                el._timer = setTimeout(() => el.classList.remove('show'), 2800);
            }

            // 图形验证码
            function generateCaptcha(len) {
                len = len || 5;
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let result = '';
                for (let i = 0; i < len; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            let captchaStore = {};

            function refreshCaptcha(prefix) {
                const box = $(prefix + 'CaptchaBox');
                if (!box) return;
                const code = generateCaptcha(5);
                box.textContent = code;
                captchaStore[prefix] = code;
                box.classList.remove('refreshing');
            }

            function verifyCaptcha(prefix, input) {
                const stored = captchaStore[prefix] || '';
                return input.toUpperCase() === stored.toUpperCase();
            }

            function isPasswordStrong(pwd) {
                return pwd.length >= 8 && /[a-zA-Z]/.test(pwd) && /\d/.test(pwd);
            }

            // 封装 API 请求
            async function apiCall(endpoint, data, token) {
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = 'Bearer ' + token;
                const res = await fetch(`${API_BASE}/${endpoint}`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.message || '请求失败');
                return json;
            }

            // ============================================================
            //  视图切换
            // ============================================================
            const views = {
                login: $('viewLogin'),
                register: $('viewRegister'),
                forgot: $('viewForgot'),
                profile: $('viewProfile')
            };

            function showView(name) {
                Object.keys(views).forEach(k => {
                    views[k].classList.toggle('active', k === name);
                });
                if (name === 'login' || name === 'register' || name === 'forgot') {
                    refreshCaptcha(name === 'login' ? 'login' : (name === 'register' ? 'reg' : 'forgot'));
                }
                if (name === 'profile') loadProfile();
            }

            // ============================================================
            //  Canvas 动态背景（复用您原有的代码）
            // ============================================================
            const canvas = $('authBgCanvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            let particles = [];
            let mouse = { x: null, y: null };

            function resizeBg() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                initParticles();
            }

            function initParticles() {
                particles = [];
                const count = Math.min(60, Math.floor((w * h) / 18000));
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        r: 1.5 + Math.random() * 2.5,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3,
                        alpha: 0.2 + Math.random() * 0.5
                    });
                }
            }

            function drawBg() {
                ctx.clearRect(0, 0, w, h);
                const isLight = document.body.classList.contains('theme-light');
                const color = isLight ? 'rgba(44,123,229,' : 'rgba(44,156,240,';
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = color + p.alpha + ')';
                    ctx.fill();
                });
                if (mouse.x !== null && mouse.y !== null) {
                    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 120);
                    const c = isLight ? 'rgba(44,123,229,' : 'rgba(44,156,240,';
                    grad.addColorStop(0, c + '0.08)');
                    grad.addColorStop(1, c + '0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, w, h);
                }
                requestAnimationFrame(drawBg);
            }

            window.addEventListener('resize', resizeBg);
            window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
            window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
            resizeBg();
            drawBg();

            // ============================================================
            //  主题同步
            // ============================================================
            function syncTheme() {
                const theme = localStorage.getItem('ui_theme') || 'dark';
                document.body.classList.toggle('theme-light', theme === 'light');
                const bg = localStorage.getItem('ui_bgColor');
                if (bg) document.documentElement.style.setProperty('--bg-color', bg);
                const accent = localStorage.getItem('ui_accentColor');
                if (accent) document.documentElement.style.setProperty('--accent-blue', accent);
                const blur = localStorage.getItem('ui_backdropBlur');
                if (blur) document.documentElement.style.setProperty('--backdrop-blur', blur + 'px');
            }
            syncTheme();

            // ============================================================
            //  注册逻辑（调用后端 API）
            // ============================================================
            $('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = $('regEmail').value.trim();
                const pwd = $('regPassword').value;
                const pwdConfirm = $('regPasswordConfirm').value;
                const captcha = $('regCaptcha').value.trim();

                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showToast('请输入有效的邮箱地址', 'error');
                    return;
                }
                if (!isPasswordStrong(pwd)) {
                    showToast('密码至少8位，含字母和数字', 'error');
                    return;
                }
                if (pwd !== pwdConfirm) {
                    showToast('两次密码输入不一致', 'error');
                    return;
                }
                if (!verifyCaptcha('reg', captcha)) {
                    showToast('验证码错误，请重新输入', 'error');
                    refreshCaptcha('reg');
                    return;
                }

                try {
                    const data = await apiCall('register', { email, password: pwd });
                    showToast(data.message || '注册成功，请查收确认邮件', 'success');
                    showView('login');
                    $('loginEmail').value = email;
                    $('registerForm').reset();
                    refreshCaptcha('reg');
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });

            // ============================================================
            //  登录逻辑（调用后端 API）
            // ============================================================
            $('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = $('loginEmail').value.trim();
                const pwd = $('loginPassword').value;
                const captcha = $('loginCaptcha').value.trim();

                if (!email || !pwd) {
                    showToast('请填写完整信息', 'error');
                    return;
                }
                if (!verifyCaptcha('login', captcha)) {
                    showToast('验证码错误，请重新输入', 'error');
                    refreshCaptcha('login');
                    return;
                }

                try {
                    const data = await apiCall('login', { email, password: pwd });
                    // 保存 token 和用户信息
                    localStorage.setItem('lt_token', data.token);
                    localStorage.setItem('lt_user', JSON.stringify(data.user));
                    showToast('登录成功！', 'success');
                    showView('profile');
                    loadProfile();
                    $('loginForm').reset();
                    refreshCaptcha('login');
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });

            // ============================================================
            //  忘记密码（调用后端 API）
            // ============================================================
            $('forgotForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = $('forgotEmail').value.trim();
                const newPwd = $('forgotNewPwd').value;
                const newPwdConfirm = $('forgotNewPwdConfirm').value;
                const captcha = $('forgotCaptcha').value.trim();

                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showToast('请输入有效的邮箱地址', 'error');
                    return;
                }
                if (!verifyCaptcha('forgot', captcha)) {
                    showToast('验证码错误，请重新输入', 'error');
                    refreshCaptcha('forgot');
                    return;
                }

                // 如果用户填写了新密码，说明可能是通过邮件链接跳转后直接设置新密码
                // 我们后端提供了 reset-password 接口，用于更新密码（需带 token）
                // 但为了简化，我们直接发送重置邮件，不在此处设置密码。
                // 用户点击邮件链接后会跳转到本页面（带 ?reset=true），届时我们可以利用 URL 参数
                // 但为了降低复杂度，我们统一使用后端发送重置邮件，用户点击邮件中的链接会跳转到 Supabase 的确认页面，
                // 然后用户会被重定向回本页面，此时 Supabase 会话已更新，用户可以在个人中心修改密码。
                // 更简单的方式：我们只发送重置邮件，不处理新密码输入。
                // 所以这里我们忽略 newPwd，只发送重置邮件。
                try {
                    const data = await apiCall('reset-password', { email });
                    showToast(data.message || '重置邮件已发送，请查收', 'success');
                    $('forgotForm').reset();
                    refreshCaptcha('forgot');
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });

            // ============================================================
            //  个人中心加载（从后端获取用户信息）
            // ============================================================
            async function loadProfile() {
                const token = localStorage.getItem('lt_token');
                if (!token) {
                    showView('login');
                    return;
                }
                try {
                    const data = await apiCall('me', {}, token);
                    const user = data.user;
                    $('profileDisplayName').textContent = user.email.split('@')[0];
                    $('profileEmail').textContent = user.email;
                    $('profileJoinDate').textContent = new Date(user.created_at).toLocaleDateString('zh-CN');
                    $('profileAvatar').textContent = user.email[0].toUpperCase();
                    $('profileVerified').textContent = user.email_confirmed_at ? '✅ 已验证' : '⚠️ 未验证';
                    $('profileStatus').textContent = '✅ 正常';
                    // 清空密码框
                    $('profileOldPwd').value = '';
                    $('profileNewPwd').value = '';
                    $('profileNewPwdConfirm').value = '';
                } catch (err) {
                    localStorage.removeItem('lt_token');
                    localStorage.removeItem('lt_user');
                    showView('login');
                    showToast('会话已过期，请重新登录', 'error');
                }
            }

            // ============================================================
            //  修改密码（调用后端 API）
            // ============================================================
            $('profileChangePwdBtn').addEventListener('click', async function() {
                const oldPwd = $('profileOldPwd').value;
                const newPwd = $('profileNewPwd').value;
                const newPwdConfirm = $('profileNewPwdConfirm').value;

                if (!oldPwd || !newPwd || !newPwdConfirm) {
                    showToast('请填写完整密码信息', 'error');
                    return;
                }
                if (!isPasswordStrong(newPwd)) {
                    showToast('新密码至少8位，含字母和数字', 'error');
                    return;
                }
                if (newPwd !== newPwdConfirm) {
                    showToast('两次新密码输入不一致', 'error');
                    return;
                }

                const token = localStorage.getItem('lt_token');
                if (!token) {
                    showToast('请先登录', 'error');
                    return;
                }

                try {
                    const data = await apiCall('change-password', { oldPassword: oldPwd, newPassword: newPwd }, token);
                    showToast(data.message || '密码已更新', 'success');
                    $('profileOldPwd').value = '';
                    $('profileNewPwd').value = '';
                    $('profileNewPwdConfirm').value = '';
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });

            // ============================================================
            //  退出登录
            // ============================================================
            $('profileLogoutBtn').addEventListener('click', function() {
                localStorage.removeItem('lt_token');
                localStorage.removeItem('lt_user');
                showView('login');
                showToast('已退出', 'success');
                refreshCaptcha('login');
            });

            // ============================================================
            //  刷新状态
            // ============================================================
            $('profileRefreshBtn').addEventListener('click', function() {
                loadProfile();
                showToast('状态已刷新 ✓', 'success');
            });

            // ============================================================
            //  视图切换链接
            // ============================================================
            $('loginToRegister').addEventListener('click', () => showView('register'));
            $('registerToLogin').addEventListener('click', () => showView('login'));
            $('loginForgotLink').addEventListener('click', () => showView('forgot'));
            $('forgotToLogin').addEventListener('click', () => showView('login'));

            // ============================================================
            //  初始化
            // ============================================================
            (function init() {
                refreshCaptcha('login');
                refreshCaptcha('reg');
                refreshCaptcha('forgot');

                // 检查本地是否有 token 并尝试加载用户
                const token = localStorage.getItem('lt_token');
                if (token) {
                    loadProfile().then(() => {
                        // 如果用户有效，会停留在 profile；否则会跳转到 login
                    });
                } else {
                    showView('login');
                }
            })();

            // 密码强度实时提示
            $('regPassword').addEventListener('input', function() {
                const val = this.value;
                const hint = $('regPwdHint');
                if (val.length === 0) {
                    hint.textContent = '至少8位，含字母和数字';
                    hint.className = 'form-hint';
                    return;
                }
                if (val.length < 8) {
                    hint.textContent = '⚠️ 至少8位';
                    hint.className = 'form-hint error';
                } else if (!/[a-zA-Z]/.test(val) || !/\d/.test(val)) {
                    hint.textContent = '⚠️ 需包含字母和数字';
                    hint.className = 'form-hint error';
                } else {
                    hint.textContent = '✅ 密码强度合格';
                    hint.className = 'form-hint success';
                }
            });

            console.log('❄ 灯雪镇 · 前后端分离账号系统已加载，后端 API:', API_BASE);
        })();
    </script>

</body>
</html>
