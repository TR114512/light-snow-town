<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灯雪镇 · 账号中心</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0f1e,#121a2f 50%,#0d1525);min-height:100vh;color:#c0caf5;display:flex;align-items:center;justify-content:center;padding:20px}
.bg-particles{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none;z-index:0}
.particle{position:absolute;background:rgba(100,140,255,0.15);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh)scale(0)}100%{transform:translateY(-10vh)scale(1)}}
.card{position:relative;z-index:1;background:rgba(15,22,42,0.92);border:1px solid rgba(100,140,255,0.15);border-radius:20px;padding:36px 32px;width:100%;max-width:440px;backdrop-filter:blur(12px);box-shadow:0 8px 40px rgba(0,0,0,0.4)}
.logo{text-align:center;margin-bottom:28px;font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#7aa2f7,#c0caf5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo a{text-decoration:none;color:inherit}
.panel{display:none}.panel.active{display:block}
.tabs{display:flex;margin-bottom:24px;border-bottom:1px solid rgba(100,140,255,0.12)}
.tab{flex:1;background:none;border:none;color:#667799;padding:10px 0;cursor:pointer;font-size:0.95rem;border-bottom:2px solid transparent;transition:all 0.3s}
.tab.active{color:#7aa2f7;border-bottom-color:#7aa2f7}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:0.82rem;color:#8899bb;margin-bottom:5px}
.fg input,.fg select{width:100%;background:rgba(10,16,30,0.7);border:1px solid rgba(100,140,255,0.18);border-radius:10px;padding:11px 14px;color:#d0d0d0;font-size:0.93rem;outline:none;transition:border-color 0.3s}
.fg input:focus{border-color:#5a7de0}
.fg-row{display:flex;gap:10px}.fg-row>*{flex:1}
.msg{font-size:0.82rem;text-align:center;margin:8px 0;display:none}.msg.err{color:#e74c3c}.msg.ok{color:#2ecc71}.msg.show{display:block}
.btn{width:100%;background:linear-gradient(135deg,#3b5fcc,#5a7de0);border:none;color:#fff;padding:12px;border-radius:10px;cursor:pointer;font-size:0.95rem;font-weight:600;transition:all 0.3s}.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,95,204,0.4)}.btn:disabled{opacity:0.5;cursor:default;transform:none;box-shadow:none}
.btn-outline{background:transparent;border:1px solid rgba(100,140,255,0.3);color:#7aa2f7;margin-top:10px}.btn-outline:hover{background:rgba(100,140,255,0.06);box-shadow:none}
.btn-sm{width:auto;padding:8px 18px;font-size:0.85rem}
.link{text-align:center;font-size:0.84rem;color:#667799;margin-top:16px}.link a{color:#7aa2f7;cursor:pointer;text-decoration:none}.link a:hover{text-decoration:underline}
.captcha-box{background:rgba(10,16,30,0.5);border:1px dashed rgba(100,140,255,0.2);border-radius:10px;padding:10px 14px;text-align:center;font-size:1.1rem;color:#c0caf5;margin-bottom:14px;user-select:none;letter-spacing:2px}
.otp-input{width:100%;background:rgba(10,16,30,0.7);border:1px solid rgba(100,140,255,0.3);border-radius:10px;padding:12px 14px;color:#fff;font-size:1.4rem;text-align:center;letter-spacing:10px;outline:none;transition:border-color 0.3s}
.otp-input:focus{border-color:#5a7de0;box-shadow:0 0 15px rgba(90,125,224,0.2)}
.countdown{font-size:0.8rem;color:#667799;text-align:center;margin-top:8px}
.back-link{position:absolute;top:16px;left:20px;color:#667799;text-decoration:none;font-size:0.85rem;transition:color 0.3s}.back-link:hover{color:#7aa2f7}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(100,140,255,0.06)}
.setting-item:last-child{border-bottom:none}
.setting-label{font-size:0.9rem;color:#c0caf5}.setting-desc{font-size:0.78rem;color:#667799;margin-top:2px}
.toggle{position:relative;width:46px;height:26px;background:rgba(100,140,255,0.12);border-radius:13px;cursor:pointer;transition:background 0.3s;border:none}
.toggle.on{background:#3b5fcc}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform 0.3s}
.toggle.on::after{transform:translateX(20px)}
.avatar-preview{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid rgba(100,140,255,0.3);margin:8px auto;display:block}
.divider{text-align:center;color:#667799;font-size:0.78rem;margin:16px 0;position:relative}.divider::before,.divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:rgba(100,140,255,0.1)}.divider::before{left:0}.divider::after{right:0}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(30,40,70,0.95);color:#c0caf5;padding:12px 24px;border-radius:24px;font-size:0.88rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;border:1px solid rgba(100,140,255,0.2)}
.toast.show{opacity:1;pointer-events:auto}
/* 欢迎模态框 */
.welcome-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
.welcome-overlay.show{opacity:1;pointer-events:auto}
.welcome-modal{background:linear-gradient(145deg,rgba(15,22,42,0.96),rgba(20,32,62,0.96));border:1px solid rgba(100,140,255,0.25);border-radius:20px;padding:40px 36px;text-align:center;max-width:380px;width:90%;transform:scale(0.85) translateY(20px);transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 80px rgba(100,140,255,0.08)}
.welcome-overlay.show .welcome-modal{transform:scale(1) translateY(0)}
.welcome-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(100,140,255,0.4);margin-bottom:16px;box-shadow:0 0 30px rgba(100,140,255,0.15)}
.welcome-title{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#7aa2f7,#c0caf5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.welcome-name{font-size:1.3rem;font-weight:600;color:#e0e0e0;margin-bottom:24px}
.welcome-sparkle{position:absolute;pointer-events:none;width:4px;height:4px;background:#fff;border-radius:50%;animation:welcomeSpark 2s ease-out forwards}
@keyframes welcomeSpark{0%{opacity:1;transform:translate(0,0)scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy))scale(0)}}
.welcome-btn{background:linear-gradient(135deg,#3b5fcc,#5a7de0);border:none;color:#fff;padding:10px 40px;border-radius:24px;font-size:1rem;cursor:pointer;font-weight:600;transition:all 0.3s}
.welcome-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(59,95,204,0.5)}
@media(max-width:480px){.card{padding:28px 20px}}
</style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="card">
  <a href="index.html" class="back-link">← 返回主页</a>
  <div class="logo">❄ 灯雪镇 · 账号中心</div>

  <!-- ====== 登录面板 ====== -->
  <div class="panel active" id="panelLogin">
    <div class="fg"><label>邮箱</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
    <div class="fg"><label>密码</label><input type="password" id="loginPassword" placeholder="输入密码"></div>
    <div class="msg err" id="loginErr"></div>
    <button class="btn" onclick="doLogin()">登 录</button>
    <div class="link"><a onclick="showPanel('register')">没有账号？去注册</a> · <a onclick="showPanel('resetPwd')">忘记密码？</a></div>
  </div>

  <!-- ====== 注册面板 ====== -->
  <div class="panel" id="panelRegister">
    <div class="fg"><label>邮箱</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
    <div class="fg"><label>游戏昵称</label><input type="text" id="regNick" placeholder="Minecraft ID"></div>
    <div class="fg"><label>密码</label><input type="password" id="regPwd" placeholder="至少6位"></div>
    <div class="fg"><label>确认密码</label><input type="password" id="regPwd2" placeholder="再次输入"></div>
    <div class="captcha-box" title="点击刷新">🤖 真人验证: <strong id="captchaQ">?</strong> = <input type="text" id="captchaA" placeholder="?" style="width:50px;display:inline;text-align:center;padding:4px;margin-left:6px" onclick="event.stopPropagation()"> <button type="button" onclick="refreshCaptcha();event.stopPropagation()" style="background:none;border:none;color:#7aa2f7;cursor:pointer;font-size:0.82rem;vertical-align:middle">🔄 换一题</button></div>
    <div class="msg err" id="regErr"></div>
    <div class="msg ok" id="regOk"></div>
    <button class="btn" onclick="doRegister()">注 册</button>
    <div class="link"><a onclick="showPanel('login')">已有账号？去登录</a></div>
  </div>

  <!-- ====== 验证邮箱面板 ====== -->
  <div class="panel" id="panelVerify">
    <p style="color:#8899bb;font-size:0.88rem;text-align:center;margin-bottom:6px">📧 验证码已发送至</p>
    <p style="color:#c0caf5;font-weight:600;text-align:center;margin-bottom:18px;word-break:break-all" id="verifyEmail"></p>
    <div class="fg"><label>6位验证码</label><input type="text" class="otp-input" id="otpCode" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code"></div>
    <div class="msg err" id="otpErr"></div>
    <div class="msg ok" id="otpOk"></div>
    <button class="btn" id="otpBtn" onclick="doVerifyOtp()">验 证</button>
    <div class="countdown" id="otpCountdown"></div>
    <div class="link"><a onclick="showPanel('login')">← 返回登录</a></div>
  </div>

  <!-- ====== 忘记密码面板 ====== -->
  <div class="panel" id="panelResetPwd">
    <p style="color:#8899bb;font-size:0.88rem;text-align:center;margin-bottom:16px">输入邮箱，我们将发送重置密码链接</p>
    <div class="fg"><label>邮箱</label><input type="email" id="resetEmail" placeholder="your@email.com"></div>
    <div class="msg err" id="resetErr"></div>
    <div class="msg ok" id="resetOk"></div>
    <button class="btn" onclick="doResetPwd()">发送重置链接</button>
    <div class="link"><a onclick="showPanel('login')">← 返回登录</a></div>
  </div>

  <!-- ====== 用户设置面板（登录后可见） ====== -->
  <div class="panel" id="panelSettings">
    <div style="text-align:center;margin-bottom:20px">
      <img class="avatar-preview" id="settingsAvatar" src="" alt="头像">
      <div style="font-weight:600;color:#c0caf5;margin-top:6px" id="settingsName"></div>
      <div style="font-size:0.8rem;color:#667799" id="settingsEmail"></div>
    </div>

    <div class="setting-item">
      <div><div class="setting-label">修改昵称</div><div class="setting-desc" id="curNick">-</div></div>
      <button class="btn btn-sm btn-outline" onclick="promptNickname()">编辑</button>
    </div>

    <div class="setting-item">
      <div><div class="setting-label">修改头像</div><div class="setting-desc">输入图片URL</div></div>
      <button class="btn btn-sm btn-outline" onclick="promptAvatar()">更换</button>
    </div>

    <div class="setting-item">
      <div><div class="setting-label">重置密码</div><div class="setting-desc">发送重置邮件到邮箱</div></div>
      <button class="btn btn-sm btn-outline" onclick="doResetPwdFromSettings()">重置</button>
    </div>

    <div class="setting-item">
      <div><div class="setting-label">二次验证 (2FA)</div><div class="setting-desc" id="fa2Desc">未开启</div></div>
      <button class="toggle" id="fa2Toggle" onclick="toggle2FA()"></button>
    </div>

    <div class="divider">绑定设置</div>

    <div class="setting-item">
      <div><div class="setting-label">绑定 QQ</div><div class="setting-desc" id="qqDesc">未绑定</div></div>
      <button class="btn btn-sm btn-outline" onclick="promptBind('qq')">绑定</button>
    </div>

    <div class="setting-item">
      <div><div class="setting-label">绑定微信</div><div class="setting-desc" id="wechatDesc">未绑定</div></div>
      <button class="btn btn-sm btn-outline" onclick="promptBind('wechat')">绑定</button>
    </div>

    <div class="setting-item">
      <div><div class="setting-label">绑定手机号</div><div class="setting-desc" id="phoneDesc">未绑定</div></div>
      <button class="btn btn-sm btn-outline" onclick="promptBind('phone')">绑定</button>
    </div>

    <button class="btn" style="margin-top:20px;background:linear-gradient(135deg,#c0392b,#e74c3c)" onclick="doLogout()">退出登录</button>
  </div>
</div>

<!-- 欢迎回来模态框 -->
<div class="welcome-overlay" id="welcomeOverlay" onclick="if(event.target===this)closeWelcome()">
  <div class="welcome-modal" id="welcomeModal">
    <img class="welcome-avatar" id="welcomeAvatar" src="" alt="avatar">
    <div class="welcome-title">🎉 欢迎回来</div>
    <div class="welcome-name" id="welcomeName"></div>
    <button class="welcome-btn" onclick="closeWelcome()">进入灯雪镇</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://yfotnbwnhulvdjxstens.supabase.co';
const SUPABASE_KEY='sb_publishable_2GG0LPkSoTDt9enH0i5p4Q_GSwQIq8y';
const s=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let user=null,profile=null,captchaVal=0,_welcomeShowing=false;
let _pendingEmail='',_pendingNick='',_otpTimer=0;

// ── particles background ──
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    d.className='particle';
    const s=Math.random()*3+1;
    d.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s}px;animation-duration:${Math.random()*10+10}s;animation-delay:${Math.random()*10}s`;
    c.appendChild(d);
  }
})();

// ── panel switch ──
function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
  if(name==='register')refreshCaptcha();
  if(name==='settings')renderSettings();
  clearMsg();
}

// ── toast ──
let tt;
function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2500);
}
function clearMsg(){
  document.querySelectorAll('.msg').forEach(e=>{e.classList.remove('show');e.textContent='';});
}

// ── captcha ──
function refreshCaptcha(){
  const a=Math.floor(Math.random()*20)+1,b=Math.floor(Math.random()*20)+1;
  const ops=['+','-','×'];
  const op=ops[Math.floor(Math.random()*3)];
  document.getElementById('captchaQ').textContent=`${a} ${op} ${b}`;
  captchaVal=op==='+'?a+b:op==='-'?a-b:a*b;
  document.getElementById('captchaA').value='';
}
refreshCaptcha();

// ── init ──
(async function init(){
  const{data:{session}}=await s.auth.getSession();
  if(session){user=session.user;await loadProfile();showPanel('settings');}
  s.auth.onAuthStateChange((_e,_session)=>{
    if(_e==='SIGNED_IN'){user=_session.user;loadProfile().then(()=>{if(!_welcomeShowing)showPanel('settings');});}
    if(_e==='SIGNED_OUT'){user=null;profile=null;showPanel('login');}
  });
})();

async function loadProfile(){
  const{data}=await s.from('profiles').select('*').eq('id',user.id).single();
  if(data){profile=data}else{
    await s.from('profiles').insert({id:user.id,email:user.email||'',nickname:'',avatar:'',created_at:new Date().toISOString()});
    profile={id:user.id,email:user.email||'',nickname:'',avatar:'',qq:'',wechat:'',phone:'',two_factor_enabled:false};
  }
}

// ── login ──
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pwd=document.getElementById('loginPassword').value;
  const err=document.getElementById('loginErr');
  if(!email||!pwd){err.textContent='请填写邮箱和密码';err.classList.add('show');return;}
  err.classList.remove('show');
  const{data,error}=await s.auth.signInWithPassword({email,password:pwd});
  if(error){err.textContent=error.message==='Invalid login credentials'?'邮箱或密码错误':error.message;err.classList.add('show');}
  else{user=data.user;await loadProfile();showWelcomeModal();}
}

// ── register ──
async function doRegister(){
  const email=document.getElementById('regEmail').value.trim();
  const nick=document.getElementById('regNick').value.trim();
  const pwd=document.getElementById('regPwd').value;
  const pwd2=document.getElementById('regPwd2').value;
  const capAns=parseInt(document.getElementById('captchaA').value);
  const err=document.getElementById('regErr'),ok=document.getElementById('regOk');
  err.classList.remove('show');ok.classList.remove('show');
  if(!email||!nick||!pwd||!pwd2){err.textContent='请填写所有必填项';err.classList.add('show');return;}
  if(pwd.length<6){err.textContent='密码至少6位';err.classList.add('show');return;}
  if(pwd!==pwd2){err.textContent='两次密码不一致';err.classList.add('show');return;}
  if(capAns!==captchaVal){err.textContent='验证答案错误,点击🔄换一题';err.classList.add('show');refreshCaptcha();return;}
  _welcomeShowing=true; // 阻止auth回调抢切面板
  const btn=document.querySelector('#panelRegister .btn');btn.disabled=true;btn.textContent='注册中...';
  const{data,error}=await s.auth.signUp({email,password:pwd,options:{emailRedirectTo:location.origin+location.pathname}});
  btn.disabled=false;btn.textContent='注 册';
  if(error){_welcomeShowing=false;err.textContent=error.message;err.classList.add('show');return;}
  if(data.user)await s.from('profiles').insert({id:data.user.id,email,nickname:nick,avatar:'',created_at:new Date().toISOString()});
  _pendingEmail=email;_pendingNick=nick;
  sendOtp(email);
}

// ── OTP email verify ──
async function sendOtp(email){
  document.getElementById('verifyEmail').textContent=email;
  document.getElementById('otpCode').value='';
  document.getElementById('otpErr').classList.remove('show');
  document.getElementById('otpOk').classList.remove('show');
  showPanel('verify');
  const{error}=await s.auth.signInWithOtp({email,options:{shouldCreateUser:true}});
  if(error){_welcomeShowing=false;document.getElementById('otpErr').textContent='发送失败:'+error.message;document.getElementById('otpErr').classList.add('show');return;}
  document.getElementById('otpOk').textContent='验证码已发送,请检查邮箱';
  document.getElementById('otpOk').classList.add('show');
  startOtpCountdown(60);
}

function startOtpCountdown(s){
  _otpTimer=s;tick();
  function tick(){
    const el=document.getElementById('otpCountdown');
    if(!el)return;
    if(_otpTimer<=0){el.innerHTML='<a style="color:#7aa2f7;cursor:pointer;text-decoration:none" onclick="sendOtp(_pendingEmail)">🔄 重新发送验证码</a>';return;}
    el.textContent=`${_otpTimer}秒后可重新发送`;
    _otpTimer--;
    setTimeout(tick,1000);
  }
}

async function doVerifyOtp(){
  const code=document.getElementById('otpCode').value.trim();
  const err=document.getElementById('otpErr'),ok=document.getElementById('otpOk');
  err.classList.remove('show');ok.classList.remove('show');
  if(!code||code.length!==6||!/^\d{6}$/.test(code)){err.textContent='请输入6位数字验证码';err.classList.add('show');return;}
  const btn=document.getElementById('otpBtn');btn.disabled=true;btn.textContent='验证中...';
  const{data,error}=await s.auth.verifyOtp({email:_pendingEmail,token:code,type:'email'});
  btn.disabled=false;btn.textContent='验 证';
  if(error){
    if(error.message.includes('expired'))err.textContent='验证码已过期,请重新发送';
    else if(error.message.includes('Invalid'))err.textContent='验证码错误';
    else err.textContent=error.message;
    err.classList.add('show');
  }else{
    user=data.user;await loadProfile();_pendingEmail='';_pendingNick='';
    toast('✅ 邮箱验证成功！');
    showWelcomeModal();
  }
}

// ── reset password ──
async function doResetPwd(){
  const email=document.getElementById('resetEmail').value.trim();
  const err=document.getElementById('resetErr'),ok=document.getElementById('resetOk');
  err.classList.remove('show');ok.classList.remove('show');
  if(!email){err.textContent='请输入邮箱';err.classList.add('show');return;}
  const{error}=await s.auth.resetPasswordForEmail(email);
  if(error){err.textContent=error.message;err.classList.add('show');}
  else{ok.textContent='重置链接已发送,请检查邮箱';ok.classList.add('show');}
}

async function doResetPwdFromSettings(){
  if(!user){toast('请先登录');return;}
  const{error}=await s.auth.resetPasswordForEmail(user.email);
  if(error)toast('发送失败:'+error.message);else toast('重置链接已发送到 '+user.email);
}

// ── settings render ──
function renderSettings(){
  if(!profile)return;
  document.getElementById('settingsName').textContent=profile.nickname||'未设置昵称';
  document.getElementById('settingsEmail').textContent=user.email;
  document.getElementById('curNick').textContent=profile.nickname||'未设置';
  document.getElementById('settingsAvatar').src=profile.avatar||'data:image/svg+xml,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60"><rect fill="#3b5fcc" width="60" height="60" rx="30"/><text fill="white" x="30" y="38" text-anchor="middle" font-size="28">${(profile.nickname||'?')[0]}</text></svg>`);
  document.getElementById('fa2Toggle').classList.toggle('on',!!profile.two_factor_enabled);
  document.getElementById('fa2Desc').textContent=profile.two_factor_enabled?'已开启':'未开启';
  document.getElementById('qqDesc').textContent=profile.qq||'未绑定';
  document.getElementById('wechatDesc').textContent=profile.wechat||'未绑定';
  document.getElementById('phoneDesc').textContent=profile.phone||'未绑定';
}

// ── settings actions ──
async function promptNickname(){
  const v=prompt('新昵称:',profile?.nickname||'');
  if(!v||!v.trim())return;
  await s.from('profiles').update({nickname:v.trim()}).eq('id',user.id);
  profile.nickname=v.trim();
  renderSettings();toast('昵称已更新');
}

async function promptAvatar(){
  const v=prompt('头像图片URL:',profile?.avatar||'');
  if(v===null)return;
  await s.from('profiles').update({avatar:v.trim()}).eq('id',user.id);
  profile.avatar=v.trim();
  renderSettings();toast('头像已更新');
}

async function toggle2FA(){
  const cur=!profile.two_factor_enabled;
  await s.from('profiles').update({two_factor_enabled:cur}).eq('id',user.id);
  profile.two_factor_enabled=cur;
  renderSettings();toast(cur?'二次验证已开启':'二次验证已关闭');
}

async function promptBind(type){
  const labels={qq:'QQ号',wechat:'微信号',phone:'手机号'};
  const v=prompt(`请输入${labels[type]}:`,profile?.[type]||'');
  if(v===null)return;
  const update={};update[type]=v.trim();
  await s.from('profiles').update(update).eq('id',user.id);
  profile[type]=v.trim();
  renderSettings();toast(`${labels[type]}已更新`);
}

// ── welcome modal ──
function showWelcomeModal(){
  _welcomeShowing=true;
  const name=profile?.nickname||user.email.split('@')[0];
  document.getElementById('welcomeName').textContent=name;
  const avatar=profile?.avatar||'data:image/svg+xml,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72"><rect fill="#3b5fcc" width="72" height="72" rx="36"/><text fill="white" x="36" y="46" text-anchor="middle" font-size="32">${name[0]}</text></svg>`);
  document.getElementById('welcomeAvatar').src=avatar;
  document.getElementById('welcomeOverlay').classList.add('show');
  // sparkles
  const modal=document.getElementById('welcomeModal');
  for(let i=0;i<12;i++){
    const spark=document.createElement('div');spark.className='welcome-sparkle';
    const angle=Math.random()*Math.PI*2,dist=Math.random()*80+40;
    spark.style.cssText=`--sx:${Math.cos(angle)*dist}px;--sy:${Math.sin(angle)*dist}px;left:50%;top:50%;animation-delay:${Math.random()*0.6}s`;
    modal.appendChild(spark);
    setTimeout(()=>spark.remove(),2600);
  }
}
function closeWelcome(){
  _welcomeShowing=false;
  document.getElementById('welcomeOverlay').classList.remove('show');
  showPanel('settings');
}
async function doLogout(){
  await s.auth.signOut();
  user=null;profile=null;
  showPanel('login');toast('已退出');
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPassword').value='';
}
</script>
</body>
</html>
