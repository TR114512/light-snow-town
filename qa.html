<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灯雪镇 · 问答中心</title>
    <link rel="icon" type="image/jpeg" href="server-icon.jpg">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f1a2e;--card:rgba(15,26,46,0.9);--border:rgba(59,130,246,0.3);--blue:#3b82f6;--gold:#f5b042;--text:#e0e8f0;--dim:#8899aa;--danger:#ef4444;--success:#22c55e;--input-bg:#1a2a3f;--tag-bg:rgba(59,130,246,0.12);--detail-bg:rgba(10,20,35,0.6)}
        body.light{--bg:#f0f4fa;--card:rgba(255,255,255,0.95);--border:rgba(59,130,246,0.25);--text:#1e2f3c;--dim:#5a6f8c;--input-bg:#e8eef4;--tag-bg:rgba(59,130,246,0.08);--detail-bg:rgba(240,244,250,0.8)}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC',system-ui,sans-serif;min-height:100vh}
        .container{max-width:960px;margin:0 auto;padding:24px 20px}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
        header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#d9eaff,#7bc5ff,#f5b042);background-clip:text;-webkit-background-clip:text;color:transparent}
        header .nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:0.85rem}
        .btn{padding:8px 18px;border-radius:30px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:0.85rem;transition:.15s;font-family:inherit;white-space:nowrap}
        .btn:hover{border-color:var(--blue);background:rgba(59,130,246,0.1)}
        .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
        .btn.primary:hover{filter:brightness(1.1)}
        .btn.danger{color:var(--danger);border-color:rgba(239,68,68,0.3)}
        .btn.danger:hover{background:rgba(239,68,68,0.1);border-color:var(--danger)}
        .btn.sm{padding:4px 12px;font-size:0.75rem}

        /* 问题卡片 */
        .q-item{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:.15s}
        .q-header{display:flex;align-items:center;gap:8px;padding:14px 20px;cursor:pointer;user-select:none}
        .q-header:hover{background:rgba(59,130,246,0.05)}
        .q-header .arrow{font-size:0.7rem;color:var(--dim);transition:transform .2s;flex-shrink:0}
        .q-item.open .q-header .arrow{transform:rotate(90deg)}
        .q-header .info{flex:1;min-width:0}
        .q-num{font-weight:700;color:var(--blue);font-size:0.8rem;margin-right:6px}
        .q-title{font-size:1rem;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .q-meta{font-size:0.75rem;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap}
        .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:600;flex-shrink:0}
        .badge.open{background:rgba(34,197,94,0.15);color:var(--success)}
        .badge.answered{background:rgba(59,130,246,0.15);color:var(--blue)}
        .badge.closed{background:rgba(136,153,170,0.15);color:var(--dim)}

        /* 下拉详情 */
        .q-detail{display:none;padding:0 20px 16px 20px;background:var(--detail-bg);border-top:1px solid var(--border)}
        .q-item.open .q-detail{display:block}
        .detail-header{display:flex;justify-content:space-between;align-items:start;margin-top:12px}
        .detail-body{margin:12px 0;line-height:1.6;white-space:pre-wrap;font-size:0.92rem;color:var(--text)}
        .section-title{font-size:0.9rem;margin-top:14px;margin-bottom:8px;color:var(--dim);border-bottom:1px solid var(--border);padding-bottom:4px}
        .reply-box{background:var(--tag-bg);border-radius:10px;padding:10px 14px;margin:6px 0;border-left:3px solid var(--blue)}
        .reply-box.admin{border-left-color:var(--gold)}
        .reply-author{font-size:0.75rem;color:var(--dim);margin-bottom:3px}
        .reply-content{font-size:0.88rem;line-height:1.5;white-space:pre-wrap}

        /* 提问弹窗 */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:999;display:none;align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;width:min(600px,94%);max-height:88vh;overflow-y:auto;padding:24px}
        .modal-card h2{font-size:1.2rem;margin-bottom:12px}

        .form-group{margin-bottom:12px}
        .form-control{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:0.9rem;outline:none;font-family:inherit;resize:vertical}
        .form-control:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}

        .inline-form{display:flex;gap:8px;margin-top:10px;align-items:center}
        .inline-form .form-control{flex:1}

        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#fff;padding:10px 24px;border-radius:30px;font-size:0.85rem;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none}
        .toast.show{opacity:1}
        .empty{text-align:center;padding:40px;color:var(--dim)}

        @media(max-width:600px){.modal-card{padding:16px}.q-header{padding:12px 14px}.q-detail{padding:0 14px 12px 14px}.q-meta{font-size:0.7rem}}
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>💬 灯雪镇 · 问答中心</h1>
        <div class="nav">
            <span id="userInfo" style="color:var(--dim);font-size:0.8rem"></span>
            <button class="btn" id="loginBtn">登录</button>
            <button class="btn primary" id="askBtn" style="display:none">+ 提问题</button>
            <button class="btn" onclick="location.href='https://tr114512.github.io/light-snow-town/home.html'">← 主页</button>
        </div>
    </header>

    <div id="questionList"></div>
</div>

<!-- 提问弹窗（保留） -->
<div class="modal-overlay" id="askOverlay" onclick="if(event.target===this)closeAsk()">
    <div class="modal-card">
        <h2>✏️ 提出问题</h2>
        <div class="form-group"><input class="form-control" id="askTitle" placeholder="问题标题"></div>
        <div class="form-group"><textarea class="form-control" id="askContent" rows="5" placeholder="详细描述你的问题..."></textarea></div>
        <div style="display:flex;gap:8px">
            <button class="btn primary" id="submitAsk">提交问题</button>
            <button class="btn" onclick="closeAsk()">取消</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
    'use strict';

    // ===== 后端 API 地址（Vercel 部署）=====
    const API = 'https://light-snow-town.vercel.app/api';

    let token = localStorage.getItem('lt_token');
    let user = JSON.parse(localStorage.getItem('lt_user')||'null');
    let userRole = 'user'; // 'admin' 管理员, 'user' 玩家
    let expandedId = null; // 当前展开的问题 ID

    function t(msg,type){
        const el=document.getElementById('toast');
        el.textContent=msg;el.className='toast show';
        el.style.borderLeft='3px solid '+(type==='ok'?'var(--success)':type==='err'?'var(--danger)':'var(--blue)');
        clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2500);
    }

    async function sf(url,opts){
        const res=await fetch(url,opts);
        const text=await res.text();
        let json;
        try{json=JSON.parse(text)}catch(_){throw new Error('服务器异常('+res.status+')')}
        if(!res.ok) throw new Error(json.message||'请求失败');
        return json;
    }

    async function checkAuth(){
        if(!token){ document.getElementById('userInfo').textContent='未登录'; return; }
        try{
            const data=await sf(API+'/me',{headers:{'Authorization':'Bearer '+token}});
            user=data.user;userRole=user.role||'user';
            localStorage.setItem('lt_user',JSON.stringify(user));
            document.getElementById('userInfo').textContent='👤 '+user.email.split('@')[0];
            document.getElementById('loginBtn').textContent='退出';
            document.getElementById('loginBtn').onclick=logout;
            document.getElementById('askBtn').style.display='inline-block';
        }catch(e){
            token=null;user=null;userRole='user';
            localStorage.removeItem('lt_token');localStorage.removeItem('lt_user');
            document.getElementById('userInfo').textContent='未登录';
        }
    }

    function logout(){
        localStorage.removeItem('lt_token');localStorage.removeItem('lt_user');
        location.reload();
    }

    document.getElementById('loginBtn').addEventListener('click',()=>{
        if(token){logout();return;}
        location.href='https://tr114512.github.io/light-snow-town/home.html?login=1';
    });

    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

    // ===== 渲染问题列表（含空详情占位） =====
    async function loadQuestions(){
        const list=document.getElementById('questionList');
        list.innerHTML='<div class="empty">加载中...</div>';
        try{
            const data=await sf(API+'/qa/questions');
            if(!data.questions.length){list.innerHTML='<div class="empty">还没有问题，来提第一个吧 ✨</div>';return}
            const isAdmin = userRole==='admin';
            list.innerHTML=data.questions.map(q=>`
                <div class="q-item" id="q-${q.id}">
                    <div class="q-header" onclick="toggleDetail(${q.id})">
                        <span class="arrow">▶</span>
                        <span class="badge ${q.status}">${q.status==='open'?'待回复':q.status==='answered'?'已回复':'已关闭'}</span>
                        <div class="info">
                            <div class="q-title"><span class="q-num">#${q.question_number}</span> ${esc(q.title)}</div>
                            <div class="q-meta">
                                <span>${esc(q.author_name||q.author_email?.split('@')[0]||'匿名')}</span>
                                <span>${new Date(q.created_at).toLocaleDateString('zh-CN')}</span>
                                <span>💬 ${q.answer_count} 回答 · ${q.comment_count} 评论</span>
                            </div>
                        </div>
                    </div>
                    <div class="q-detail" id="detail-${q.id}">
                        <div class="empty" style="padding:20px">加载中...</div>
                    </div>
                </div>
            `).join('');
        }catch(e){list.innerHTML='<div class="empty" style="color:var(--danger)">'+e.message+'</div>'}
    }

    // ===== 展开/收起问题详情 =====
    async function toggleDetail(qid){
        const item = document.getElementById('q-'+qid);
        if(!item) return;

        // 如果点击的是已展开的 → 收起
        if(item.classList.contains('open')){
            item.classList.remove('open');
            expandedId = null;
            return;
        }

        // 收起之前展开的
        if(expandedId && expandedId !== qid){
            const prev = document.getElementById('q-'+expandedId);
            if(prev) prev.classList.remove('open');
        }

        // 展开当前
        item.classList.add('open');
        expandedId = qid;

        // 加载详情内容
        const detail = document.getElementById('detail-'+qid);
        if(detail && detail.querySelector('.empty')){
            detail.innerHTML='<div class="empty" style="padding:20px">加载中...</div>';
            try{
                const data = await sf(API+'/qa/questions?id='+qid);
                renderDetail(qid, data);
            }catch(e){
                detail.innerHTML='<div class="empty" style="color:var(--danger);padding:20px">'+e.message+'</div>';
            }
        }

        // 滚动到该问题
        item.scrollIntoView({behavior:'smooth',block:'nearest'});
    }

    // ===== 渲染详情内容 =====
    function renderDetail(qid, data){
        const detail = document.getElementById('detail-'+qid);
        if(!detail) return;
        const q = data.question;
        const answers = data.answers||[];
        const comments = data.comments||[];
        const isAdmin = userRole==='admin';
        const uid = 'q'+qid; // 唯一前缀避免 ID 冲突

        detail.innerHTML = `
            <div class="detail-header">
                <div></div>
                <div style="display:flex;gap:6px">
                    ${isAdmin?`<button class="btn danger sm" id="${uid}-delBtn">🗑 删除问题</button>`:''}
                </div>
            </div>
            <div class="detail-body">${esc(q.content)}</div>

            <!-- 回答区 -->
            <div class="section-title">📝 回答 (${answers.length})</div>
            ${answers.map((a,i)=>`
                <div class="reply-box ${a.is_admin_answer?'admin':''}">
                    <div class="reply-author">${a.is_admin_answer?'🛡 管理员':'👤 玩家'} ${esc(a.author_name||a.author_email?.split('@')[0]||'匿名')} · ${new Date(a.created_at).toLocaleString('zh-CN')}</div>
                    <div class="reply-content">${esc(a.content)}</div>
                </div>
            `).join('')||'<div style="color:var(--dim);font-size:0.85rem;padding:4px 0">暂无回答</div>'}

            ${isAdmin?`
            <div style="margin-top:10px">
                <textarea class="form-control" id="${uid}-answerInput" rows="3" placeholder="以管理员身份回答..."></textarea>
                <button class="btn primary sm" style="margin-top:6px" id="${uid}-answerBtn">发布回答</button>
            </div>`:''}

            <!-- 评论区 -->
            <div class="section-title">💬 评论 (${comments.length})</div>
            ${comments.map(c=>`
                <div class="reply-box">
                    <div class="reply-author">👤 玩家 ${esc(c.author_name||c.author_email?.split('@')[0]||'匿名')} · ${new Date(c.created_at).toLocaleString('zh-CN')}</div>
                    <div class="reply-content">${esc(c.content)}</div>
                </div>
            `).join('')||'<div style="color:var(--dim);font-size:0.85rem;padding:4px 0">暂无评论</div>'}

            ${token?`
            <div class="inline-form">
                <input class="form-control" id="${uid}-commentInput" placeholder="写评论...">
                <button class="btn sm" id="${uid}-commentBtn">发送</button>
            </div>`:`<div style="margin-top:10px;color:var(--dim);font-size:0.8rem">请登录后评论</div>`}
        `;

        // 绑定事件
        if(isAdmin){
            document.getElementById(uid+'-delBtn').addEventListener('click',()=>delQ(qid));
            document.getElementById(uid+'-answerBtn').addEventListener('click',()=>postAnswer(qid, uid));
        }
        if(token){
            document.getElementById(uid+'-commentBtn').addEventListener('click',()=>postComment(qid, uid));
        }
    }

    // ===== 发布回答 =====
    async function postAnswer(qid, uid){
        const input = document.getElementById(uid+'-answerInput');
        const content = input.value.trim();
        if(!content){t('请输入回答内容','err');return}
        try{
            await sf(API+'/qa/answer',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({question_id:qid,content})});
            t('回答已发布','ok');
            // 刷新详情
            const data = await sf(API+'/qa/questions?id='+qid);
            renderDetail(qid, data);
            loadQuestions();
        }catch(e){t(e.message,'err')}
    }

    // ===== 发布评论 =====
    async function postComment(qid, uid){
        const input = document.getElementById(uid+'-commentInput');
        const content = input.value.trim();
        if(!content){t('请输入评论','err');return}
        try{
            await sf(API+'/qa/comment',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({question_id:qid,content})});
            t('评论已发布','ok');
            const data = await sf(API+'/qa/questions?id='+qid);
            renderDetail(qid, data);
            loadQuestions();
        }catch(e){t(e.message,'err')}
    }

    // ===== 删除问题 =====
    async function delQ(qid){
        if(!confirm('确定删除此问题？'))return;
        try{
            await sf(API+'/qa/delete',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({question_id:qid})});
            t('已删除','ok');
            expandedId = null;
            loadQuestions();
        }catch(e){t(e.message,'err')}
    }

    function closeAsk(){document.getElementById('askOverlay').classList.remove('open')}

    window.toggleDetail = toggleDetail;

    document.getElementById('askBtn').addEventListener('click',()=>{
        if(!token){t('请先登录','err');return}
        document.getElementById('askOverlay').classList.add('open');
    });

    document.getElementById('submitAsk').addEventListener('click',async()=>{
        const title=document.getElementById('askTitle').value.trim();
        const content=document.getElementById('askContent').value.trim();
        if(!title||!content){t('请填写标题和内容','err');return}
        try{
            await sf(API+'/qa/questions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({title,content})});
            t('问题已提交','ok');closeAsk();loadQuestions();
            document.getElementById('askTitle').value='';document.getElementById('askContent').value='';
        }catch(e){t(e.message,'err')}
    });

    checkAuth().then(()=>loadQuestions());
})();
</script>
</body>
</html>
