<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灯雪镇 · 管理面板</title>
    <link rel="icon" type="image/jpeg" href="server-icon.jpg">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f1a2e;--card:rgba(15,26,46,0.9);--border:rgba(59,130,246,0.3);--blue:#3b82f6;--gold:#f5b042;--text:#e0e8f0;--dim:#8899aa;--danger:#ef4444;--success:#22c55e;--input-bg:#1a2a3f}
        body.light{--bg:#f0f4fa;--card:rgba(255,255,255,0.95);--border:rgba(59,130,246,0.25);--text:#1e2f3c;--dim:#5a6f8c;--input-bg:#e8eef4}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC',system-ui,sans-serif;min-height:100vh}
        .container{max-width:1200px;margin:0 auto;padding:24px 20px}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
        header h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#d9eaff,#7bc5ff,#f5b042);background-clip:text;-webkit-background-clip:text;color:transparent}
        header .nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
        .btn{padding:8px 18px;border-radius:30px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:0.85rem;transition:.15s;font-family:inherit;white-space:nowrap}
        .btn:hover{border-color:var(--blue);background:rgba(59,130,246,0.1)}
        .btn.danger{color:var(--danger);border-color:rgba(239,68,68,0.4)}
        .btn.danger:hover{background:rgba(239,68,68,0.15);border-color:var(--danger)}
        .btn.gold{color:var(--gold);border-color:rgba(245,176,66,0.4)}
        .btn.gold:hover{background:rgba(245,176,66,0.15);border-color:var(--gold)}

        .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
        .search-box{flex:1;min-width:200px;padding:10px 16px;border-radius:30px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:0.9rem;outline:none;font-family:inherit}
        .search-box:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.2)}
        .stats{font-size:0.85rem;color:var(--dim)}
        .stat-card{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center}
        .stat-num{font-size:1.5rem;font-weight:700;color:var(--blue)}
        .stat-label{font-size:0.75rem;color:var(--dim);margin-top:2px}

        .table-wrap{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden}
        .table-wrap table{width:100%;border-collapse:collapse}
        .table-wrap th{text-align:left;padding:12px 16px;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--dim);border-bottom:1px solid var(--border);background:rgba(0,0,0,0.15)}
        .table-wrap td{padding:10px 16px;font-size:0.88rem;border-bottom:1px solid rgba(255,255,255,0.05)}
        .table-wrap tr:hover td{background:rgba(59,130,246,0.05)}
        .table-wrap tr:last-child td{border-bottom:none}

        .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.7rem;font-weight:600}
        .badge.verified{background:rgba(34,197,94,0.15);color:var(--success)}
        .badge.unverified{background:rgba(239,68,68,0.15);color:var(--danger)}
        .badge.super{background:rgba(245,176,66,0.2);color:var(--gold)}
        .badge.admin{background:rgba(59,130,246,0.2);color:var(--blue)}
        .badge.user{background:rgba(136,153,170,0.15);color:var(--dim)}

        .role-select{padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:0.75rem;cursor:pointer;font-family:inherit}
        .role-select:focus{border-color:var(--blue);outline:none}

        .actions{display:flex;gap:6px;white-space:nowrap}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.88);color:#fff;padding:10px 24px;border-radius:30px;font-size:0.85rem;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;border-left:3px solid var(--blue)}
        .toast.show{opacity:1}
        .toast.err{border-left-color:var(--danger)}
        .toast.ok{border-left-color:var(--success)}
        .loading{text-align:center;padding:40px;color:var(--dim)}

        @media(max-width:700px){.table-wrap{overflow-x:auto}header{flex-direction:column;align-items:flex-start}.actions{flex-direction:column}}
        .ip-ban-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding:12px 16px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
        .ip-ban-form input{padding:8px 12px;border-radius:20px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:0.85rem;font-family:inherit;min-width:120px}
        .ip-ban-form input:focus{border-color:var(--blue);outline:none}
        .ip-ban-form select{padding:8px 12px;border-radius:20px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:0.85rem;font-family:inherit}
        .ban-remaining.permanent{color:var(--danger);font-weight:600}
        .ban-remaining.expiring{color:var(--gold)}

        /* 模态窗 */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 0.25s,visibility 0s 0.25s}
        .modal-overlay.open{opacity:1;visibility:visible;transition:opacity 0.25s,visibility 0s 0s}
        .modal-box{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:24px;max-width:520px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,0.6)}
        .modal-box h3{margin-bottom:16px;font-size:1.2rem;color:var(--blue)}
        .modal-box .form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
        .modal-box input,.modal-box select{padding:8px 12px;border-radius:20px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:0.85rem;font-family:inherit}
        .modal-box input:focus,.modal-box select:focus{border-color:var(--blue);outline:none}
        .modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🛡 灯雪镇 · 管理面板</h1>
        <div class="nav">
            <span id="operatorInfo" style="font-size:0.8rem;color:var(--dim);"></span>
            <button class="btn" onclick="location.href='https://tr114512.github.io/light-snow-town/home.html'">← 返回主页</button>
            <button class="btn danger" id="logoutBtn">退出</button>
        </div>
    </header>

    <!-- 仪表盘 -->
    <div class="dashboard" id="dashboard" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
        <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">总用户</div></div>
        <div class="stat-card"><div class="stat-num" id="statVerified">-</div><div class="stat-label">已验证</div></div>
        <div class="stat-card"><div class="stat-num" id="statUnverified">-</div><div class="stat-label">未验证</div></div>
        <div class="stat-card"><div class="stat-num" id="statToday">-</div><div class="stat-label">今日注册</div></div>
        <div class="stat-card"><div class="stat-num" id="statQuestions">-</div><div class="stat-label">总问题</div></div>
        <div class="stat-card"><div class="stat-num" id="statOpen">-</div><div class="stat-label">待回复</div></div>
    </div>

    <div class="toolbar">
        <input class="search-box" id="searchInput" placeholder="🔍 搜索用户邮箱...">
        <button class="btn sm" id="toggleUnverified">📋 仅已验证</button>
        <button class="btn sm danger" id="cleanupBtn">🧹 清理未验证</button>
        <button class="btn sm gold" id="openCreateUserModal">➕ 创建账号</button>
        <button class="btn sm" id="openIpBanModal">🚫 IP 封禁</button>
        <button class="btn sm danger" id="batchDeleteBtn" style="display:none">🗑 批量删除</button>
        <span class="stats" id="statsText">共 0 个用户</span>
    </div>
    <div class="toolbar" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:0.8rem">
        <span style="color:var(--dim);">🕐 自动清理间隔：</span>
        <select id="cleanupInterval" style="background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;margin-right:12px;">
            <option value="0">关闭</option>
            <option value="1">1 分钟</option>
            <option value="5" selected>5 分钟</option>
            <option value="10">10 分钟</option>
            <option value="30">30 分钟</option>
        </select>
        <span id="countdownText" style="color:var(--dim);"></span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width:30px"><input type="checkbox" id="selectAll" title="全选"></th>
                    <th style="width:40px">#</th>
                    <th>邮箱</th>
                    <th>QQ</th>
                    <th>游戏ID</th>
                    <th>IP 地址</th>
                    <th>状态</th>
                    <th>角色</th>
                    <th>注册时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <tr><td colspan="11" class="loading">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 创建账号模态窗 -->
<div class="modal-overlay" id="createUserModalOverlay">
    <div class="modal-box">
        <h3>➕ 创建账号（免邮箱验证）</h3>
        <div class="form-row">
            <input type="email" id="createEmail" placeholder="邮箱" required style="flex:2;min-width:150px">
            <input type="password" id="createPassword" placeholder="密码（≥8位）" style="flex:1;min-width:120px">
        </div>
        <div class="form-row">
            <input type="text" id="createQQ" placeholder="QQ号" style="flex:1">
            <input type="text" id="createGameId" placeholder="游戏ID" style="flex:1">
            <select id="createRole" style="flex:0.6">
                <option value="user">玩家</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn" id="closeCreateUserModal">取消</button>
            <button class="btn gold" id="createUserBtn">✨ 创建</button>
        </div>
    </div>
</div>

<!-- IP 封禁模态窗 -->
<div class="modal-overlay" id="ipBanModalOverlay">
    <div class="modal-box" style="max-width:600px">
        <h3>🚫 IP 封禁管理</h3>
        <div class="form-row">
            <input type="text" id="banIpInput" placeholder="IP 地址 (如 1.2.3.4)" style="flex:1;min-width:130px">
            <input type="text" id="banReasonInput" placeholder="封禁原因" style="flex:2;min-width:130px">
            <select id="banDuration" style="flex:0.8">
                <option value="1">1 小时</option>
                <option value="6">6 小时</option>
                <option value="24" selected>24 小时</option>
                <option value="72">3 天</option>
                <option value="168">7 天</option>
                <option value="720">30 天</option>
                <option value="0">永久</option>
            </select>
            <button class="btn danger" id="banIpBtn">🔒 封禁</button>
        </div>
        <div class="table-wrap" style="margin-top:12px">
            <table>
                <thead><tr><th>IP</th><th>原因</th><th>封禁时间</th><th>剩余</th><th>操作者</th><th>操作</th></tr></thead>
                <tbody id="ipBanTableBody"><tr><td colspan="6" class="loading">加载中...</td></tr></tbody>
            </table>
        </div>
        <div class="modal-actions">
            <button class="btn" id="closeIpBanModal">关闭</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
    'use strict';
    const API_BASE = 'https://yfotnbwnhulvdjxstens.supabase.co/functions/v1/super-api';
    const HOME = 'https://tr114512.github.io/light-snow-town/home.html';
    const ROLE_LABELS = {'admin':'管理员','user':'玩家'};
    const CAN_MANAGE = {'admin':['admin','user'],'user':[]};

    let operatorRole = 'user';
    let operatorEmail = '';
    let showAll = true;  // 默认显示全部，可切换为仅已验证
    let cleanupTimer = null;
    let cleanupCountdown = 0;
    let cleanupIntervalMin = 5; // 默认5分钟

    // HTML 转义防 XSS
    function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    // ---- 安全 fetch（防 HTML 响应崩 JSON 解析） ----
    async function safeFetch(url, opts){
        const res = await fetch(url, opts);
        const text = await res.text();
        let json;
        try{ json = JSON.parse(text); }
        catch(_){ throw new Error('服务器返回异常(' + res.status + ')，请检查 Vercel 环境变量'); }
        if(!res.ok) throw new Error(json.message || json.error || '请求失败('+res.status+')');
        return json;
    }

    // ---- Toast ----
    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(msg, type){
        toastEl.textContent = msg;
        toastEl.className = 'toast ' + (type === 'ok' ? 'ok' : type === 'err' ? 'err' : '');
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // ---- 鉴权 ----
    async function checkAuth(){
        const token = localStorage.getItem('lt_token');
        if(!token){ location.href = HOME; return; }
        try{
            const data = await safeFetch(API_BASE + '/me', {
                headers: {'Authorization':'Bearer '+token}
            });
            if(!data.user) throw new Error('auth failed');
            if(data.user.role !== 'admin' && data.user.role !== 'super_admin'){
                toast('需要管理员权限','err');
                setTimeout(() => location.href = HOME, 1500);
                return;
            }
            operatorRole = data.user.role;
            operatorEmail = data.user.email;
            document.getElementById('operatorInfo').textContent = '👤 ' + operatorEmail + ' (' + (ROLE_LABELS[operatorRole]||operatorRole) + ')';
            loadUsers();
        }catch(e){
            localStorage.removeItem('lt_token');
            location.href = HOME;
        }
    }

    // ---- 加载用户列表 ----
    async function loadUsers(search){
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '<tr><td colspan="11" class="loading">加载中...</td></tr>';
        const token = localStorage.getItem('lt_token');
        try{
            let url = API_BASE + '/admin/users';
            const params = [];
            if(search) params.push('search=' + encodeURIComponent(search));
            if(!showAll) params.push('verified=1');
            if(params.length) url += '?' + params.join('&');
            const data = await safeFetch(url, {headers:{'Authorization':'Bearer '+token}});

            document.getElementById('statsText').textContent = '共 ' + data.total + ' 个用户';

            if(data.users.length === 0){
                tbody.innerHTML = '<tr><td colspan="11" class="loading">没有匹配用户</td></tr>';
                return;
            }

            const canManage = CAN_MANAGE[operatorRole] || [];
            const myId = JSON.parse(localStorage.getItem('lt_user')||'{}').id;

            tbody.innerHTML = data.users.map(u => {
                const isSelf = u.id === myId;
                const canEdit = canManage.includes(u.role) && !isSelf;
                const canDelete = !isSelf;
                const canPwd = !isSelf;

                const eId = escHtml(u.id);
                const eEmail = escHtml(u.email);
                const eQQ = escHtml(u.qq);
                const eGameId = escHtml(u.game_id);

                let roleCell;
                if(canEdit){
                    const opts = canManage.map(r => `<option value="${r}" ${u.role===r?'selected':''}>${ROLE_LABELS[r]}</option>`).join('');
                    roleCell = `<select class="role-select" data-userid="${eId}" data-email="${eEmail}" onchange="setRole(this.dataset.userid,this.dataset.email,this.value)">${opts}</select>`;
                } else {
                    const cls = u.role === 'admin' ? 'admin' : 'user';
                    roleCell = `<span class="badge ${cls}">${ROLE_LABELS[u.role]||u.role}</span>`;
                }

                return `<tr>
                    <td><input type="checkbox" class="user-check" data-userid="${eId}" ${isSelf?'disabled':''}></td>
                    <td style="color:var(--dim);font-size:0.8rem">${u.user_no}</td>
                    <td><strong>${eEmail}</strong>${isSelf?' <span style="font-size:0.7rem;opacity:0.5;">(你)</span>':''}</td>
                    <td style="font-size:0.82rem;">${eQQ || '<span style="color:var(--dim);opacity:0.5;">-</span>'}</td>
                    <td style="font-size:0.82rem;">${eGameId || '<span style="color:var(--dim);opacity:0.5;">-</span>'}</td>
                    <td style="font-size:0.78rem;font-family:monospace;color:var(--dim)">${escHtml(u.ip || '') || '<span style="opacity:0.4;">未知</span>'}</td>
                    <td>${u.email_confirmed?'<span class="badge verified">✓ 已验证</span>':'<span class="badge unverified">✗ 未验证</span>'}</td>
                    <td>${roleCell}</td>
                    <td style="font-size:0.8rem;color:var(--dim)">${new Date(u.created_at).toLocaleDateString('zh-CN')}</td>
                    <td><div class="actions">
                        ${canPwd?`<button class="btn" style="font-size:0.7rem;padding:4px 12px" data-userid="${eId}" data-email="${eEmail}" onclick="resetPwd(this.dataset.userid,this.dataset.email)">改密码</button>`:''}
                        ${canDelete?`<button class="btn danger" style="font-size:0.7rem;padding:4px 12px" data-userid="${eId}" data-email="${eEmail}" onclick="deleteUser(this.dataset.userid,this.dataset.email)">删除</button>`:''}
                    </div></td>
                </tr>`;
            }).join('');

            // 全选逻辑
            document.getElementById('selectAll').onchange = function(){
                document.querySelectorAll('.user-check:not([disabled])').forEach(cb => cb.checked = this.checked);
                updateBatchBtn();
            };
            document.querySelectorAll('.user-check').forEach(cb => cb.addEventListener('change', updateBatchBtn));
        }catch(e){
            tbody.innerHTML = `<tr><td colspan="11" class="loading" style="color:var(--danger)">${e.message}</td></tr>`;
        }
    }

    // 批量删除按钮显示/隐藏
    function updateBatchBtn(){
        const checked = document.querySelectorAll('.user-check:checked').length;
        document.getElementById('batchDeleteBtn').style.display = checked > 0 ? 'inline-block' : 'none';
    }

    // ---- 设置角色 ----
    window.setRole = async function(userId, email, role){
        if(!confirm(`将 ${email} 设为「${ROLE_LABELS[role]}」？`)){ loadUsers(); return; }
        const token = localStorage.getItem('lt_token');
        try{
            const data = await safeFetch(API_BASE+'/admin/set-role',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({userId,role})
            });
            toast(data.message,'ok');
            loadUsers(document.getElementById('searchInput').value.trim());
        }catch(e){ toast(e.message,'err'); loadUsers(); }
    };

    // ---- 改密码 ----
    window.resetPwd = async function(userId, email){
        const pwd = prompt(`为「${email}」设置新密码（至少8位）：`);
        if(!pwd) return;
        if(pwd.length < 8){ toast('密码至少8位','err'); return; }
        const token = localStorage.getItem('lt_token');
        try{
            const data = await safeFetch(API_BASE+'/admin/reset-user-password',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({userId,newPassword:pwd})
            });
            toast(data.message,'ok');
        }catch(e){ toast(e.message,'err'); }
    };

    // ---- 删除 ----
    window.deleteUser = async function(userId, email){
        if(!confirm(`⚠️ 永久删除「${email}」？不可撤销！`)) return;
        const token = localStorage.getItem('lt_token');
        try{
            const data = await safeFetch(API_BASE+'/admin/delete-user',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({userId})
            });
            toast(data.message,'ok');
            loadUsers(document.getElementById('searchInput').value.trim());
        }catch(e){ toast(e.message,'err'); }
    };

    // ---- 事件绑定 ----
    document.getElementById('searchInput').addEventListener('input',function(){
        loadUsers(this.value.trim());
    });
    document.getElementById('toggleUnverified').addEventListener('click',function(){
        showAll = !showAll;
        this.textContent = showAll ? '📋 仅已验证' : '📋 显示全部';
        loadUsers(document.getElementById('searchInput').value.trim());
    });

    // 清理未验证
    document.getElementById('cleanupBtn').addEventListener('click',async function(){
        if(!confirm('删除所有超过5分钟未验证邮箱的账号？')) return;
        const token = localStorage.getItem('lt_token');
        try{
            const data = await safeFetch(API_BASE+'/admin/users',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({action:'cleanup'})
            });
            toast(data.message,'ok');
            loadUsers();
        }catch(e){ toast(e.message,'err'); }
    });

    // 批量删除
    document.getElementById('batchDeleteBtn').addEventListener('click',async function(){
        const checked = [...document.querySelectorAll('.user-check:checked')];
        if(!checked.length) return;
        if(!confirm(`确定删除选中的 ${checked.length} 个用户？`)) return;
        const userIds = checked.map(cb => cb.dataset.userid);
        const token = localStorage.getItem('lt_token');
        try{
            const data = await safeFetch(API_BASE+'/admin/users',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({action:'batch-delete',userIds})
            });
            toast(data.message,'ok');
            loadUsers();
        }catch(e){ toast(e.message,'err'); }
    });

    document.getElementById('logoutBtn').addEventListener('click',function(){
        localStorage.removeItem('lt_token');
        localStorage.removeItem('lt_user');
        location.href = HOME;
    });

    // ---- 自动清理定时器 ----
    async function runAutoCleanup(){
        const token = localStorage.getItem('lt_token');
        if(!token) return;
        try{
            const data = await safeFetch(API_BASE+'/admin/users',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({action:'cleanup'})
            });
            if(data.message && data.message.includes('已清理')){
                const count = parseInt(data.message) || 0;
                if(count > 0) {
                    toast('🕐 自动清理了 ' + count + ' 个未验证账号', 'ok');
                    loadUsers();
                }
            }
        }catch(_){ /* 静默失败 */ }
    }

    function startCleanupTimer(minutes){
        stopCleanupTimer();
        if(!minutes || minutes <= 0){
            document.getElementById('countdownText').textContent = '自动清理已关闭';
            return;
        }
        cleanupIntervalMin = minutes;
        cleanupCountdown = minutes * 60;
        updateCountdown();
        cleanupTimer = setInterval(() => {
            cleanupCountdown--;
            updateCountdown();
            if(cleanupCountdown <= 0){
                runAutoCleanup();
                cleanupCountdown = cleanupIntervalMin * 60;
                updateCountdown();
            }
        }, 1000);
        localStorage.setItem('lt_cleanup_interval', minutes);
    }

    function stopCleanupTimer(){
        if(cleanupTimer){ clearInterval(cleanupTimer); cleanupTimer = null; }
    }

    function updateCountdown(){
        const m = Math.floor(cleanupCountdown / 60);
        const s = cleanupCountdown % 60;
        document.getElementById('countdownText').textContent = 
            `下次清理: ${m}:${String(s).padStart(2,'0')}`;
    }

    document.getElementById('cleanupInterval').addEventListener('change', function(){
        startCleanupTimer(parseInt(this.value));
    });

    // ---- 主题同步 ----
    if(localStorage.getItem('ui_theme') === 'light') document.body.classList.add('light');

    // ---- 启动 ----
    checkAuth().then(() => {
        loadDashboard();
        const saved = parseInt(localStorage.getItem('lt_cleanup_interval'));
        const interval = saved || 5;
        document.getElementById('cleanupInterval').value = interval;
        if(interval > 0) startCleanupTimer(interval);
    });

    async function loadDashboard(){
        const token = localStorage.getItem('lt_token');
        if(!token) return;
        try{
            const data = await safeFetch(API_BASE+'/admin/dashboard',{headers:{'Authorization':'Bearer '+token}});
            const s = data.stats;
            document.getElementById('statTotal').textContent = s.totalUsers;
            document.getElementById('statVerified').textContent = s.verified;
            document.getElementById('statUnverified').textContent = s.unverified;
            document.getElementById('statToday').textContent = s.todayReg;
            document.getElementById('statQuestions').textContent = s.totalQuestions;
            document.getElementById('statOpen').textContent = s.openQuestions;
        }catch(_){}
    }

    // ---- 模态窗控制 ----
    function openModal(id){ document.getElementById(id).classList.add('open'); }
    function closeModal(id){ document.getElementById(id).classList.remove('open'); }

    document.getElementById('openCreateUserModal').addEventListener('click', () => openModal('createUserModalOverlay'));
    document.getElementById('closeCreateUserModal').addEventListener('click', () => closeModal('createUserModalOverlay'));
    document.getElementById('createUserModalOverlay').addEventListener('click', function(e){ if(e.target===this) closeModal('createUserModalOverlay'); });

    document.getElementById('openIpBanModal').addEventListener('click', () => { openModal('ipBanModalOverlay'); loadIpBans(); });
    document.getElementById('closeIpBanModal').addEventListener('click', () => closeModal('ipBanModalOverlay'));
    document.getElementById('ipBanModalOverlay').addEventListener('click', function(e){ if(e.target===this) closeModal('ipBanModalOverlay'); });

    // ---- 管理员创建用户 ----
    document.getElementById('createUserBtn').addEventListener('click', async function(){
        const email = document.getElementById('createEmail').value.trim();
        const password = document.getElementById('createPassword').value.trim();
        const qq = document.getElementById('createQQ').value.trim();
        const gameId = document.getElementById('createGameId').value.trim();
        const role = document.getElementById('createRole').value;
        if(!email || !password){ toast('请填写邮箱和密码','err'); return; }
        if(password.length < 8){ toast('密码至少8位','err'); return; }
        if(!confirm(`创建账号：\n邮箱: ${email}\n角色: ${role === 'admin' ? '管理员' : '玩家'}\nQQ: ${qq || '-'}\n游戏ID: ${gameId || '-'}\n\n确定创建？（邮箱自动验证）`)) return;
        const token = localStorage.getItem('lt_token');
        try{
            const data = await safeFetch(API_BASE + '/admin/create-user', {
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({email,password,qq,game_id:gameId,role})
            });
            toast(data.message,'ok');
            document.getElementById('createEmail').value = '';
            document.getElementById('createPassword').value = '';
            document.getElementById('createQQ').value = '';
            document.getElementById('createGameId').value = '';
            closeModal('createUserModalOverlay');
            loadUsers();
        }catch(e){ toast(e.message,'err'); }
    });

    // ---- IP 封禁管理 ----
    async function loadIpBans(){
        const tbody = document.getElementById('ipBanTableBody');
        tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
        const token = localStorage.getItem('lt_token');
        if(!token) return;
        try{
            const data = await safeFetch(API_BASE + '/admin/ip-bans', {
                headers: {'Authorization':'Bearer '+token}
            });
            if(!data.bans || data.bans.length === 0){
                tbody.innerHTML = '<tr><td colspan="6" class="loading">暂无封禁记录</td></tr>';
                return;
            }
            tbody.innerHTML = data.bans.map(b => {
                const cls = b.remaining_seconds === null ? 'permanent' : (b.remaining_seconds < 3600 ? 'expiring' : '');
                return `<tr>
                    <td><code style="background:rgba(0,0,0,0.2);padding:2px 8px;border-radius:4px">${escHtml(b.ip)}</code></td>
                    <td>${escHtml(b.reason)}</td>
                    <td style="font-size:0.8rem;color:var(--dim)">${new Date(b.banned_at).toLocaleString('zh-CN')}</td>
                    <td><span class="ban-remaining ${cls}">${b.remaining_text}</span></td>
                    <td style="font-size:0.8rem;color:var(--dim)">${escHtml(b.banned_by)}</td>
                    <td><button class="btn" style="font-size:0.7rem;padding:4px 12px;color:var(--success);border-color:rgba(34,197,94,0.4)" data-ip="${escHtml(b.ip)}" onclick="unbanIp(this.dataset.ip)">🔓 解封</button></td>
                </tr>`;
            }).join('');
        }catch(e){
            tbody.innerHTML = `<tr><td colspan="6" class="loading" style="color:var(--danger)">${e.message}</td></tr>`;
        }
    }

    document.getElementById('banIpBtn').addEventListener('click', async function(){
        const ip = document.getElementById('banIpInput').value.trim();
        const reason = document.getElementById('banReasonInput').value.trim();
        const hours = parseInt(document.getElementById('banDuration').value);
        if(!ip){ toast('请输入IP地址','err'); return; }
        if(!/^[0-9a-f.:]+$/i.test(ip)){ toast('无效的IP地址格式','err'); return; }
        const durText = hours === 0 ? '永久' : hours + '小时';
        if(!confirm(`封禁 IP: ${ip}\n时长: ${durText}\n原因: ${reason || '违规操作'}\n\n确定？`)) return;
        const token = localStorage.getItem('lt_token');
        try{
            const data = await safeFetch(API_BASE + '/admin/ip-bans', {
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({action:'ban', ip, reason, hours: hours || null})
            });
            toast(data.message, 'ok');
            document.getElementById('banIpInput').value = '';
            document.getElementById('banReasonInput').value = '';
            loadIpBans();
        }catch(e){ toast(e.message, 'err'); }
    });

    window.unbanIp = async function(ip){
        if(!confirm(`解封 IP: ${ip}？`)) return;
        const token = localStorage.getItem('lt_token');
        try{
            const data = await safeFetch(API_BASE + '/admin/ip-bans', {
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({action:'unban', ip})
            });
            toast(data.message, 'ok');
            loadIpBans();
        }catch(e){ toast(e.message, 'err'); }
    };
})();
</script>
</body>
</html>
